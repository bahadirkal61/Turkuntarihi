# Turk Tarihi - Nginx Güvenlik Duvarı (4 Katman)

# ============================================
# KATMAN 1: Rate Limiting (DDoS/Brute Force Koruması)
# ============================================
limit_req_zone $binary_remote_addr zone=general:10m rate=30r/m;
limit_req_zone $binary_remote_addr zone=login:10m rate=5r/m;
limit_req_zone $binary_remote_addr zone=api:10m rate=20r/m;
limit_conn_zone $binary_remote_addr zone=connections:10m;

# Bot/scraper tespiti
map $http_user_agent $is_bot {
    default 0;
    ~*(curl|wget|python|scrapy|bot|crawler|spider|nikto|nmap|sqlmap|masscan) 1;
}

# ============================================
# KATMAN 2: Security Headers
# ============================================
# Content Security Policy (XSS engelleme)
add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://unpkg.com; style-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://fonts.googleapis.com https://unpkg.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https://*.tile.openstreetmap.org https://*.basemaps.cartocdn.com https://cdn.jsdelivr.net https://ui-avatars.com; connect-src 'self' /api /trpc; frame-ancestors 'none'; base-uri 'self'; form-action 'self';" always;

# Clickjacking koruması
add_header X-Frame-Options "DENY" always;

# MIME sniffing engelleme
add_header X-Content-Type-Options "nosniff" always;

# XSS koruması
add_header X-XSS-Protection "1; mode=block" always;

# Referrer Policy
add_header Referrer-Policy "strict-origin-when-cross-origin" always;

# HSTS (HTTPS zorunlu)
add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

# Permissions Policy
add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), payment=(), usb=(), magnetometer=(), gyroscope=()" always;

# ============================================
# KATMAN 3: Bot Engelleyici
# ============================================
# Bilinen botları engelle
if ($is_bot) {
    return 444;
}

# ============================================
# KATMAN 4: Güvenli Nginx Yapılandırması
# ============================================
server {
    listen 80 default_server;
    server_name turkuntarihi.com www.turkuntarihi.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2 default_server;
    server_name turkuntarihi.com www.turkuntarihi.com;

    # SSL Sertifikaları (Certbot otomatik yönetir)
    ssl_certificate /etc/letsencrypt/live/turkuntarihi.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/turkuntarihi.com/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/turkuntarihi.com/chain.pem;

    # SSL Güvenliği
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384';
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:50m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;
    ssl_stapling on;
    ssl_stapling_verify on;

    # Root dizin
    root /var/www/turkuntarihi/dist;
    index index.html;

    # Rate limiting - genel
    limit_req zone=general burst=20 nodelay;
    limit_conn connections 50;

    # Gzip sıkıştırma
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml+rss
        application/atom+xml
        image/svg+xml
        font/woff2;

    # API endpoint'leri için rate limit
    location /api/ {
        limit_req zone=api burst=30 nodelay;
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        proxy_connect_timeout 10s;
    }

    # tRPC endpoint'leri için rate limit
    location /trpc/ {
        limit_req zone=api burst=50 nodelay;
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Login sayfası için sıkı rate limit
    location ~* /(yonetim|login|giris) {
        limit_req zone=login burst=5 nodelay;
        try_files $uri $uri/ /index.html;
    }

    # Statik dosyalar için cache
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # SPA routing
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Gizli dosyaları engelle
    location ~ /\. {
        deny all;
        return 404;
    }
    location ~ /(\.env|\.git|\.ht|package\.json|vite\.config) {
        deny all;
        return 404;
    }

    # Büyük dosya yükleme limiti
    client_max_body_size 10M;

    # Zaman aşımı
    keepalive_timeout 65;
    send_timeout 30;
}
